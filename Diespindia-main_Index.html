<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Result Manager</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 50px;
    }
    .box {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
    }
    input {
      padding: 10px;
      width: 80%;
      margin: 10px 0;
      border-radius: 5px;
      border: none;
    }
    button {
      padding: 10px 20px;
      background: #38bdf8;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    #result {
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <div class="box">
    <h2>Result Manager</h2>
    <input type="text" id="roll" placeholder="Enter Roll Number">
    <br>
    <button onclick="checkResult()">Check Result</button>

    <div id="result"></div>
  </div>

  <script>
    function checkResult() {
      let roll = document.getElementById("roll").value;

      if (roll === "123") {
        document.getElementById("result").innerHTML =
          "<p>Name: Sunny</p><p>Marks: 85%</p>";
      } else {
        document.getElementById("result").innerHTML =
          "<p>No result found</p>";
      }
    }
  </script>

</body>
</html>
